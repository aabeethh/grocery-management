<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Grocery List">
    <meta name="theme-color" content="#ffffff">
    <title>🛒 Grocery List Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Modern Professional Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: #f1f5f9;
            color: #0f172a;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main App Container */
        .container {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 12px 40px -12px rgba(15, 23, 42, 0.15), 0 0 0 1px rgba(15, 23, 42, 0.03);
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            height: 85dvh;
            overflow: hidden;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Area */
        .header {
            background: #ffffff;
            padding: 24px;
            padding-top: max(24px, calc(env(safe-area-inset-top) + 8px));
            text-align: left;
            flex-shrink: 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.03em;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
        }

        /* Input Section */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px 24px;
            background: #ffffff;
            flex-shrink: 0;
            z-index: 10;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 70px;
            gap: 10px;
        }

        /* Input Fields - iOS Optimized */
        input[type="text"],
        input[type="number"],
        input[type="datetime-local"] {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            color: #0f172a;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: #94a3b8;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="datetime-local"]:focus {
            outline: none;
            background: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* Add Button - Fixed for Mobile */
        .add-btn {
            padding: 14px 20px;
            background: #0f172a;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            -webkit-user-select: none;
            user-select: none;
        }

        .add-btn:active {
            background: #1e293b;
            transform: scale(0.97);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
            padding: 0 24px 12px;
            background: #ffffff;
            flex-wrap: wrap;
            flex-shrink: 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .action-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 12px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #475569;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            -webkit-user-select: none;
            user-select: none;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn.success {
            color: #059669;
            border-color: #a7f3d0;
            background: #f0fdf4;
        }

        .action-btn.danger {
            color: #e11d48;
            border-color: #fecdd3;
            background: #fff1f2;
        }

        /* List Section */
        .list-section {
            padding: 12px 24px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .list-section::-webkit-scrollbar {
            width: 5px;
        }

        .list-section::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 16px;
            color: #cbd5e1;
        }

        .empty-state p {
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Grocery Items */
        .grocery-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grocery-item.purchased {
            background: #f8fafc;
            border-color: #f1f5f9;
            opacity: 0.6;
        }

        .grocery-item.purchased .item-name {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #3b82f6;
            flex-shrink: 0;
            border-radius: 6px;
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #0f172a;
            word-break: break-word;
            line-height: 1.3;
        }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .item-quantity {
            color: #475569;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .item-status {
            background: #eff6ff;
            color: #2563eb;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.7rem;
        }

        /* Delete Button */
        .delete-btn {
            width: 34px;
            height: 34px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .delete-btn:active {
            background: #fee2e2;
            color: #e11d48;
        }

        /* Statistics Footer */
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 12px 24px;
            padding-bottom: max(12px, calc(env(safe-area-inset-bottom) + 4px));
            background: #ffffff;
            border-top: 1px solid #f1f5f9;
            flex-shrink: 0;
        }

        .stat-item {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-number {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .stat-item span:last-child {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            font-weight: 600;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.3s ease;
            padding-bottom: max(24px, calc(env(safe-area-inset-bottom) + 16px));
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .modal-close {
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:active {
            background: #e2e8f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #475569;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-group input:focus {
            outline: none;
            background: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #0f172a;
            color: #ffffff;
        }

        .btn-primary:active {
            background: #1e293b;
            transform: scale(0.97);
        }

        .btn-secondary {
            background: #ffffff;
            color: #0f172a;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:active {
            background: #f8fafc;
        }

        /* Notification Badge */
        .notification-badge {
            position: fixed;
            top: max(20px, calc(env(safe-area-inset-top) + 10px));
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 12px 20px;
            border-radius: 100px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.2);
            z-index: 2000;
            animation: slideDown 0.4s ease;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            max-width: 80%;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Fullscreen Mobile Optimization */
        @media (max-width: 600px) {
            body {
                padding: 0;
                background: #ffffff;
            }

            .container {
                max-width: 100%;
                height: 100vh;
                height: 100dvh;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }

            .header {
                padding: 16px;
                padding-top: max(16px, calc(env(safe-area-inset-top) + 8px));
            }

            .input-section {
                padding: 12px 16px;
            }

            .input-group {
                grid-template-columns: 1fr 65px;
                gap: 8px;
            }

            input[type="text"],
            input[type="number"] {
                padding: 12px 14px;
                font-size: 16px;
            }

            .action-buttons {
                padding: 0 16px 10px;
                gap: 6px;
            }

            .action-btn {
                min-width: 70px;
                padding: 8px 10px;
                font-size: 0.75rem;
            }

            .list-section {
                padding: 10px 16px;
                gap: 8px;
            }

            .grocery-item {
                padding: 12px;
                gap: 10px;
            }

            .delete-btn {
                width: 32px;
                height: 32px;
            }

            .stats {
                padding: 10px 16px;
                padding-bottom: max(10px, calc(env(safe-area-inset-bottom) + 4px));
                gap: 10px;
            }

            .stat-number {
                font-size: 1.1rem;
            }

            .modal-content {
                padding: 20px;
                padding-bottom: max(20px, calc(env(safe-area-inset-bottom) + 12px));
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🛒 Grocery List</h1>
            <p>Smart shopping made easy</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="itemInput" placeholder="Add item..." autocomplete="off">
                <input type="number" id="quantityInput" placeholder="Qty" min="1" value="1">
            </div>
            <button class="add-btn" onclick="addItem()">
                <i class="fas fa-plus"></i> Add
            </button>
        </div>

        <div class="action-buttons">
            <button class="action-btn success" onclick="markAllPending()">
                <i class="fas fa-clock"></i> Pending
            </button>
            <button class="action-btn danger" onclick="clearPurchased()">
                <i class="fas fa-trash"></i> Clear
            </button>
            <button class="action-btn" onclick="openNotificationModal()">
                <i class="fas fa-bell"></i> Remind
            </button>
        </div>

        <div class="list-section" id="listSection">
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>No items yet</p>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalCount">0</span>
                <span>Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="purchasedCount">0</span>
                <span>Bought</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="pendingCount">0</span>
                <span>Pending</span>
            </div>
        </div>
    </div>

    <div id="notificationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Set Reminder</h2>
                <button class="modal-close" onclick="closeNotificationModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="form-group">
                <label>Message</label>
                <input type="text" id="reminderMessage" placeholder="e.g., Go shopping" value="Don't forget to go shopping!">
            </div>
            <div class="form-group">
                <label>Date & Time</label>
                <input type="datetime-local" id="reminderTime">
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeNotificationModal()">Cancel</button>
                <button class="btn-primary" onclick="setReminder()">Set</button>
            </div>
        </div>
    </div>

    <script>
        let groceryList = JSON.parse(localStorage.getItem('groceryList')) || [];
        let reminders = JSON.parse(localStorage.getItem('reminders')) || [];

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        document.getElementById('itemInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addItem();
        });

        function addItem() {
            const nameInput = document.getElementById('itemInput');
            const quantityInput = document.getElementById('quantityInput');

            const name = nameInput.value.trim();
            const quantity = parseInt(quantityInput.value) || 1;

            if (!name) {
                alert('Please enter item name');
                nameInput.focus();
                return;
            }

            groceryList.push({
                id: Date.now(),
                name: name,
                quantity: quantity,
                purchased: false,
                pending: false
            });

            saveList();
            renderList();
            nameInput.value = '';
            quantityInput.value = '1';
            nameInput.focus();
        }

        function deleteItem(id) {
            groceryList = groceryList.filter(item => item.id !== id);
            saveList();
            renderList();
        }

        function togglePurchased(id) {
            const item = groceryList.find(i => i.id === id);
            if (item) {
                item.purchased = !item.purchased;
                if (item.purchased) item.pending = false;
                saveList();
                renderList();
            }
        }

        function markAllPending() {
            groceryList.forEach(item => {
                if (!item.purchased) item.pending = true;
            });
            saveList();
            renderList();
        }

        function clearPurchased() {
            groceryList = groceryList.filter(item => !item.purchased);
            saveList();
            renderList();
        }

        function renderList() {
            const listSection = document.getElementById('listSection');

            if (groceryList.length === 0) {
                listSection.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>No items yet</p></div>`;
                updateStats();
                return;
            }

            listSection.innerHTML = groceryList.map(item => `
                <div class="grocery-item ${item.purchased ? 'purchased' : ''}">
                    <input type="checkbox" class="checkbox" ${item.purchased ? 'checked' : ''} onchange="togglePurchased(${item.id})">
                    <div class="item-content">
                        <div class="item-name">${item.name}</div>
                        <div class="item-meta">
                            <span class="item-quantity">Qty: ${item.quantity}</span>
                            ${item.pending ? '<span class="item-status">Pending</span>' : ''}
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${item.id})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');

            updateStats();
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = groceryList.length;
            document.getElementById('purchasedCount').textContent = groceryList.filter(i => i.purchased).length;
            document.getElementById('pendingCount').textContent = groceryList.filter(i => i.pending && !i.purchased).length;
        }

        function saveList() {
            localStorage.setItem('groceryList', JSON.stringify(groceryList));
        }

        function openNotificationModal() {
            document.getElementById('notificationModal').classList.add('active');
            setDefaultDateTime();
        }

        function closeNotificationModal() {
            document.getElementById('notificationModal').classList.remove('active');
        }

        function setDefaultDateTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() + 30);
            document.getElementById('reminderTime').value = now.toISOString().slice(0, 16);
        }

        function setReminder() {
            const message = document.getElementById('reminderMessage').value.trim();
            const time = document.getElementById('reminderTime').value;

            if (!message || !time) {
                alert('Fill all fields');
                return;
            }

            const reminderTime = new Date(time).getTime();
            if (reminderTime <= Date.now()) {
                alert('Select future time');
                return;
            }

            reminders.push({
                id: Date.now(),
                message: message,
                time: reminderTime,
                notified: false
            });

            localStorage.setItem('reminders', JSON.stringify(reminders));
            showNotification('✓ Reminder Set');
            closeNotificationModal();
            checkReminders();
        }

        function checkReminders() {
            reminders.forEach(reminder => {
                if (!reminder.notified) {
                    const timeUntil = reminder.time - Date.now();
                    if (timeUntil > 0) {
                        setTimeout(() => {
                            if ('Notification' in window && Notification.permission === 'granted') {
                                new Notification('🛒 Grocery List', { body: reminder.message });
                            }
                            showNotification(reminder.message);
                            reminder.notified = true;
                            localStorage.setItem('reminders', JSON.stringify(reminders));
                        }, timeUntil);
                    }
                }
            });
        }

        function showNotification(message) {
            const badge = document.createElement('div');
            badge.className = 'notification-badge';
            badge.textContent = message;
            document.body.appendChild(badge);
            setTimeout(() => badge.remove(), 3500);
        }

        document.getElementById('notificationModal').addEventListener('click', (e) => {
            if (e.target.id === 'notificationModal') closeNotificationModal();
        });

        renderList();
        checkReminders();
        setInterval(checkReminders, 60000);
    </script>

</body>
</html>
